<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kelime Sepeti</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8;
  --card-bg: #ffffff;
  --primary: #4f46e5;
  --learned: #10b981;
  --review: #f43f5e;
  --text: #1e293b;
  --muted: #94a3b8;
  --tab-h: 64px;
  --radius: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; }

/* HEADER */
.header { padding: 16px 20px 10px; background: var(--card-bg); border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
.header h1 { font-size: 18px; font-weight: 900; color: var(--primary); }
.header .stats { display: flex; gap: 12px; margin-top: 4px; font-size: 13px; }
.stat-pill { background: #f1f5f9; border-radius: 20px; padding: 2px 10px; font-weight: 700; }
.stat-pill.green { background: #d1fae5; color: #065f46; }
.stat-pill.red { background: #ffe4e6; color: #9f1239; }
.stat-pill.blue { background: #e0e7ff; color: #3730a3; }

/* PAGES */
.page { flex: 1; overflow: hidden; display: none; flex-direction: column; }
.page.active { display: flex; }

/* CARDS PAGE */
.cards-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; overflow: hidden; }
.card-stack { position: relative; width: 100%; max-width: 340px; height: 240px; }
.flash-card {
  position: absolute; inset: 0;
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 30px; text-align: center;
  cursor: grab; user-select: none;
  transition: box-shadow 0.2s;
  touch-action: none;
}
.flash-card .en-word { font-size: 38px; font-weight: 900; color: var(--text); }
.flash-card .tr-word { font-size: 22px; font-weight: 700; color: var(--primary); margin-top: 12px; }
.flash-card .en-small { font-size: 14px; color: var(--muted); margin-top: 4px; font-style: italic; }
.flash-card .tap-hint { font-size: 12px; color: var(--muted); margin-top: 16px; }

.swipe-hint {
  position: absolute; top: 50%; transform: translateY(-50%);
  font-size: 28px; font-weight: 900; opacity: 0; transition: opacity 0.15s;
  pointer-events: none; border-radius: 12px; padding: 6px 14px;
}
.swipe-hint.left { left: -10px; color: var(--review); background: #ffe4e6; }
.swipe-hint.right { right: -10px; color: var(--learned); background: #d1fae5; }

.card-counter { font-size: 13px; color: var(--muted); font-weight: 700; margin-bottom: 16px; }
.action-hints { display: flex; justify-content: space-between; width: 100%; max-width: 340px; margin-top: 16px; font-size: 13px; font-weight: 700; }
.action-hints .left-h { color: var(--review); }
.action-hints .right-h { color: var(--learned); }

.done-card { text-align: center; padding: 40px 20px; }
.done-card .emoji { font-size: 52px; }
.done-card h2 { font-size: 22px; font-weight: 900; margin: 12px 0 6px; }
.done-card p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
.btn { background: var(--primary); color: #fff; border: none; border-radius: 14px; padding: 13px 28px; font-size: 15px; font-weight: 800; font-family: inherit; cursor: pointer; transition: transform 0.1s, opacity 0.1s; }
.btn:active { transform: scale(0.97); }
.btn.outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); margin-left: 8px; }
.btn.green { background: var(--learned); }
.btn.red { background: var(--review); }

/* FILTER BAR */
.filter-bar { display: flex; gap: 8px; padding: 10px 16px; background: var(--card-bg); border-bottom: 1px solid #e2e8f0; flex-shrink: 0; overflow-x: auto; }
.filter-btn { background: #f1f5f9; border: none; border-radius: 20px; padding: 5px 14px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.filter-btn.active { background: var(--primary); color: #fff; }

/* QUIZ PAGE */
.quiz-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.quiz-q { background: var(--card-bg); border-radius: var(--radius); padding: 24px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.quiz-q .q-label { font-size: 12px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.quiz-q .q-word { font-size: 36px; font-weight: 900; }
.quiz-q .q-progress { font-size: 12px; color: var(--muted); margin-top: 8px; font-weight: 700; }

.options-grid { display: flex; flex-direction: column; gap: 10px; }
.opt-btn {
  background: var(--card-bg); border: 2px solid #e2e8f0; border-radius: 14px;
  padding: 14px 18px; font-size: 16px; font-weight: 700; font-family: inherit;
  cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s;
  position: relative; overflow: hidden;
}
.opt-btn:active { transform: scale(0.98); }
.opt-btn.correct { background: #d1fae5; border-color: var(--learned); color: #065f46; }
.opt-btn.wrong { background: #ffe4e6; border-color: var(--review); color: #9f1239; }

.quiz-score-bar { background: var(--card-bg); border-radius: var(--radius); padding: 16px 20px; display: flex; gap: 16px; align-items: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); flex-shrink: 0; }
.score-num { font-size: 24px; font-weight: 900; color: var(--primary); }
.score-label { font-size: 12px; color: var(--muted); font-weight: 700; }
.score-bar-inner { flex: 1; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
.score-bar-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.3s; }

.quiz-empty { text-align: center; padding: 40px 20px; }
.quiz-empty .emoji { font-size: 48px; }
.quiz-empty h3 { font-size: 18px; font-weight: 900; margin: 12px 0 6px; }
.quiz-empty p { color: var(--muted); font-size: 14px; }

/* LIST PAGE */
.list-area { flex: 1; overflow-y: auto; }
.list-search { padding: 12px 16px; background: var(--card-bg); border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
.list-search input { width: 100%; background: #f1f5f9; border: none; border-radius: 12px; padding: 10px 14px; font-size: 14px; font-family: inherit; outline: none; }
.word-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #f1f5f9; background: var(--card-bg); gap: 12px; }
.word-item .badge { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.badge.learned { background: var(--learned); }
.badge.review { background: var(--review); }
.badge.new { background: #e2e8f0; }
.word-item .en { font-weight: 800; font-size: 15px; }
.word-item .tr { color: var(--muted); font-size: 13px; margin-top: 2px; }
.word-item button { margin-left: auto; background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px; }

/* TAB BAR */
.tab-bar { height: var(--tab-h); background: var(--card-bg); border-top: 1px solid #e2e8f0; display: flex; flex-shrink: 0; }
.tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; background: none; border: none; font-family: inherit; font-size: 10px; font-weight: 700; color: var(--muted); cursor: pointer; transition: color 0.15s; }
.tab-btn.active { color: var(--primary); }
.tab-btn svg { width: 22px; height: 22px; }

/* OVERLAY for swipe feedback */
.swipe-overlay { position: absolute; inset: 0; border-radius: var(--radius); pointer-events: none; opacity: 0; transition: opacity 0.1s; }

@keyframes flyLeft { to { transform: translateX(-120%) rotate(-20deg); opacity: 0; } }
@keyframes flyRight { to { transform: translateX(120%) rotate(20deg); opacity: 0; } }
.fly-left { animation: flyLeft 0.3s ease-in forwards; }
.fly-right { animation: flyRight 0.3s ease-in forwards; }

/* Responsive adjustments */
@media (min-height: 700px) {
  .flash-card .en-word { font-size: 44px; }
  .card-stack { height: 260px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>📚 Kelime Sepeti</h1>
  <div class="stats">
    <span class="stat-pill blue" id="stat-total">0 kelime</span>
    <span class="stat-pill green" id="stat-learned">0 öğrendim</span>
    <span class="stat-pill red" id="stat-review">0 tekrar</span>
  </div>
</div>

<!-- KARTLAR -->
<div class="page active" id="page-cards">
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Tümü</button>
    <button class="filter-btn" data-filter="new" onclick="setFilter('new')">Yeni</button>
    <button class="filter-btn" data-filter="review" onclick="setFilter('review')">Tekrar</button>
    <button class="filter-btn" data-filter="learned" onclick="setFilter('learned')">Öğrendim</button>
  </div>
  <div class="cards-area">
    <div class="card-counter" id="card-counter"></div>
    <div class="card-stack" id="card-stack">
      <div id="done-view" class="done-card" style="display:none">
        <div class="emoji">🎉</div>
        <h2>Harika!</h2>
        <p id="done-text"></p>
        <button class="btn" onclick="restartDeck()">Tekrar Başla</button>
        <button class="btn outline" onclick="setFilter('review')">Sadece Tekrarlar</button>
      </div>
    </div>
    <div class="action-hints">
      <span class="left-h">← Tekrar Gör</span>
      <span>Kaydır</span>
      <span class="right-h">Öğrendim →</span>
    </div>
  </div>
</div>

<!-- QUİZ -->
<div class="page" id="page-quiz">
  <div style="padding:12px 16px; background:var(--card-bg); border-bottom:1px solid #e2e8f0; flex-shrink:0; display:flex; align-items:center; justify-content:space-between;">
    <span style="font-weight:900; font-size:15px;">Quiz</span>
    <button class="btn" style="padding:7px 16px; font-size:13px;" onclick="startQuiz()">Yeni Quiz</button>
  </div>
  <div class="quiz-area" id="quiz-area">
    <div class="quiz-empty">
      <div class="emoji">🧠</div>
      <h3>Quiz için hazır!</h3>
      <p>Önce kart ekranında kelimeler öğren, sonra quiz başlat.</p>
    </div>
  </div>
</div>

<!-- LİSTE -->
<div class="page" id="page-list">
  <div class="list-search">
    <input type="search" placeholder="Kelime ara..." id="search-input" oninput="renderList()" />
  </div>
  <div class="list-area" id="list-area"></div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-cards" onclick="switchTab('cards')">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="3"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="13" y2="13"/></svg>
    Kartlar
  </button>
  <button class="tab-btn" id="tab-quiz" onclick="switchTab('quiz')">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17" stroke-linecap="round" stroke-width="3"/></svg>
    Quiz
  </button>
  <button class="tab-btn" id="tab-list" onclick="switchTab('list')">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6" stroke-linecap="round" stroke-width="3"/><line x1="3" y1="12" x2="3.01" y2="12" stroke-linecap="round" stroke-width="3"/><line x1="3" y1="18" x2="3.01" y2="18" stroke-linecap="round" stroke-width="3"/></svg>
    Liste
  </button>
</div>

// Remove duplicates by English word
const wordMap = {};
WORDS.forEach(([en,tr]) => { if(!wordMap[en]) wordMap[en] = tr; });
const ALL_WORDS = Object.entries(wordMap).map(([en,tr]) => ({en,tr}));

// ============ STATE ============
const STORAGE_KEY = 'kelime_sepeti_v1';
let state = {
  learned: {}, // en -> true
  review: {},  // en -> true
};

function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); if(s) state = JSON.parse(s); } catch(e) {}
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getStatus(en) {
  if(state.learned[en]) return 'learned';
  if(state.review[en]) return 'review';
  return 'new';
}
function setLearned(en) { state.learned[en] = true; delete state.review[en]; saveState(); updateStats(); }
function setReview(en) { state.review[en] = true; delete state.learned[en]; saveState(); updateStats(); }

function updateStats() {
  const total = ALL_WORDS.length;
  const learned = Object.keys(state.learned).length;
  const review = Object.keys(state.review).length;
  document.getElementById('stat-total').textContent = total + ' kelime';
  document.getElementById('stat-learned').textContent = learned + ' öğrendim';
  document.getElementById('stat-review').textContent = review + ' tekrar';
}

// ============ CARDS ============
let deck = [];
let deckIndex = 0;
let currentFilter = 'all';
let cardFlipped = false;

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  buildDeck();
}

function buildDeck() {
  deck = ALL_WORDS.filter(w => {
    const s = getStatus(w.en);
    if(currentFilter === 'all') return true;
    return s === currentFilter;
  });
  // Shuffle
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  deckIndex = 0;
  cardFlipped = false;
  renderCard();
}

function renderCard() {
  const stack = document.getElementById('card-stack');
  const doneView = document.getElementById('done-view');
  // Remove previous card
  const prev = stack.querySelector('.flash-card');
  if(prev) prev.remove();

  updateStats();
  const counter = document.getElementById('card-counter');

  if(deckIndex >= deck.length) {
    doneView.style.display = 'flex';
    doneView.style.flexDirection = 'column';
    doneView.style.alignItems = 'center';
    const learned = Object.keys(state.learned).length;
    document.getElementById('done-text').textContent = `${learned} kelime öğrendin! Tüm kartları tamamladın.`;
    counter.textContent = '';
    return;
  }
  doneView.style.display = 'none';

  const word = deck[deckIndex];
  counter.textContent = `${deckIndex+1} / ${deck.length}`;

  const card = document.createElement('div');
  card.className = 'flash-card';
  card.innerHTML = `
    <div class="en-word">${word.en}</div>
    <div class="tr-word">${word.tr}</div>
    <div class="swipe-hint left">Tekrar</div>
    <div class="swipe-hint right">Öğrendim</div>
  `;
  stack.appendChild(card);
  cardFlipped = true;

  // Swipe handling
  let startX, startY, swipeDx = 0;
  const onStart = (e) => {
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX; startY = t.clientY; swipeDx = 0;
  };
  const onMove = (e) => {
    if(!startX) return;
    const t = e.touches ? e.touches[0] : e;
    swipeDx = t.clientX - startX;
    const swipeDy = t.clientY - startY;
    if(Math.abs(swipeDx) < 8) return;
    e.preventDefault();
    card.style.transform = `translateX(${swipeDx}px) rotate(${swipeDx*0.05}deg)`;
    const ratio = Math.min(Math.abs(swipeDx)/80, 1);
    card.querySelector('.swipe-hint.left').style.opacity = swipeDx < 0 ? ratio : 0;
    card.querySelector('.swipe-hint.right').style.opacity = swipeDx > 0 ? ratio : 0;
  };
  const onEnd = () => {
    if(!startX) return;
    startX = null;
    if(swipeDx > 60) {
      setLearned(deck[deckIndex].en);
      card.classList.add('fly-right');
      setTimeout(() => { deckIndex++; renderCard(); }, 300);
    } else if(swipeDx < -60) {
      setReview(deck[deckIndex].en);
      card.classList.add('fly-left');
      setTimeout(() => { deckIndex++; renderCard(); }, 300);
    } else {
      card.style.transform = '';
      card.querySelector('.swipe-hint.left').style.opacity = 0;
      card.querySelector('.swipe-hint.right').style.opacity = 0;
      swipeDx = 0;
    }
  };
  card.addEventListener('touchstart', onStart, {passive:true});
  card.addEventListener('touchmove', onMove, {passive:false});
  card.addEventListener('touchend', onEnd);

  card.addEventListener('mousedown', (e) => {
    onStart(e);
    const mmove = (e2) => onMove(e2);
    const mup = () => { onEnd(); window.removeEventListener('mousemove', mmove); window.removeEventListener('mouseup', mup); };
    window.addEventListener('mousemove', mmove);
    window.addEventListener('mouseup', mup);
  });
}

function restartDeck() { buildDeck(); }

// ============ QUIZ ============
let quiz = { questions:[], index:0, score:0, answered:false };

function startQuiz() {
  const learnedWords = ALL_WORDS.filter(w => state.learned[w.en]);
  if(learnedWords.length < 4) {
    document.getElementById('quiz-area').innerHTML = `<div class="quiz-empty"><div class="emoji">📚</div><h3>Yeterli kelime yok</h3><p>Quiz için en az 4 kelime öğrenmen gerekiyor. Şu an: ${learnedWords.length}</p></div>`;
    return;
  }
  // Build 20 questions (or less)
  const shuffled = [...learnedWords].sort(() => Math.random()-0.5);
  const qCount = Math.min(20, shuffled.length);
  quiz.questions = shuffled.slice(0, qCount).map(word => {
    // wrong options from all words
    const others = ALL_WORDS.filter(w => w.en !== word.en).sort(() => Math.random()-0.5).slice(0,3);
    const options = [...others, word].sort(() => Math.random()-0.5);
    return { word, options };
  });
  quiz.index = 0; quiz.score = 0; quiz.answered = false;
  renderQuiz();
}

function renderQuiz() {
  const area = document.getElementById('quiz-area');
  if(quiz.index >= quiz.questions.length) {
    const pct = Math.round(quiz.score/quiz.questions.length*100);
    area.innerHTML = `
      <div class="quiz-q">
        <div class="emoji" style="font-size:48px;margin-bottom:12px">${pct>=70?'🏆':'💪'}</div>
        <div style="font-size:24px;font-weight:900;">${quiz.score}/${quiz.questions.length}</div>
        <div style="font-size:14px;color:var(--muted);margin-top:4px">%${pct} doğru</div>
      </div>
      <button class="btn" style="width:100%;padding:16px;font-size:16px" onclick="startQuiz()">Tekrar Başla</button>`;
    return;
  }
  const q = quiz.questions[quiz.index];
  area.innerHTML = `
    <div class="quiz-score-bar">
      <div><div class="score-num">${quiz.score}</div><div class="score-label">PUAN</div></div>
      <div class="score-bar-inner"><div class="score-bar-fill" style="width:${quiz.index/quiz.questions.length*100}%"></div></div>
      <div><div class="score-num">${quiz.questions.length-quiz.index}</div><div class="score-label">KALDI</div></div>
    </div>
    <div class="quiz-q">
      <div class="q-label">Bu kelimenin Türkçe karşılığı nedir?</div>
      <div class="q-word">${q.word.en}</div>
      <div class="q-progress">Soru ${quiz.index+1} / ${quiz.questions.length}</div>
    </div>
    <div class="options-grid" id="opts">
      ${q.options.map(opt => `<button class="opt-btn" onclick="answerQuiz('${opt.en}','${q.word.en}',this)">${opt.tr}</button>`).join('')}
    </div>`;
}

function answerQuiz(chosen, correct, btn) {
  if(quiz.answered) return;
  quiz.answered = true;
  const opts = document.querySelectorAll('.opt-btn');
  opts.forEach(b => {
    const words = quiz.questions[quiz.index].options;
    // match by text content
    const matchWord = quiz.questions[quiz.index].options.find(o => o.tr === b.textContent);
    if(matchWord && matchWord.en === correct) b.classList.add('correct');
    else if(b === btn) b.classList.add('wrong');
    b.style.pointerEvents = 'none';
  });
  if(chosen === correct) quiz.score++;
  setTimeout(() => { quiz.index++; quiz.answered = false; renderQuiz(); }, 900);
}

// ============ LIST ============
function renderList() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const area = document.getElementById('list-area');
  const filtered = ALL_WORDS.filter(w => !q || w.en.includes(q) || w.tr.includes(q));
  area.innerHTML = filtered.slice(0,200).map(w => {
    const s = getStatus(w.en);
    return `<div class="word-item">
      <div class="badge ${s}"></div>
      <div><div class="en">${w.en}</div><div class="tr">${w.tr}</div></div>
      <button onclick="toggleWord('${w.en}')">${s==='learned'?'✅':s==='review'?'🔄':'○'}</button>
    </div>`;
  }).join('');
}

function toggleWord(en) {
  const s = getStatus(en);
  if(s === 'learned') { delete state.learned[en]; }
  else { setLearned(en); }
  saveState(); updateStats(); renderList();
}

// ============ TABS ============
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab === 'list') renderList();
}

// ============ INIT ============
loadState();
buildDeck();
updateStats();
</script>
